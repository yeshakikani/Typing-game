<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#0e0e1a;--bg3:#141420;--border:#2a2a40;--border2:#1e1e30;
  --text:#ffffff;--text2:#aaaaaa;--text3:#555555;--text4:#333333;
  --correct:#00ffb2;--wrong:#ff4444;--warn:#ffaa00;--accent:#00c8ff;
  --easy:#00ffb2;--medium:#ffaa00;--hard:#ff4466;
}
.light{
  --bg:#f4f4f8;--bg2:#ffffff;--bg3:#eeeef5;--border:#d0d0e0;--border2:#e0e0ee;
  --text:#0a0a1a;--text2:#444466;--text3:#888899;--text4:#bbbbcc;
  --correct:#007a55;--wrong:#cc2222;--warn:#b87000;--accent:#0066bb;
  --easy:#007a55;--medium:#b87000;--hard:#cc2244;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;transition:background .3s,color .3s}
#root{width:100%;min-height:100vh;display:flex;justify-content:center;align-items:flex-start}
.wrap{width:100%;max-width:680px;padding:16px 14px 48px}

/* WRONG MESSAGE */
.wrong-msg{
  background:var(--wrong);color:#fff;
  border-radius:8px;padding:10px 16px;
  margin-bottom:12px;font-size:13px;font-weight:700;
  letter-spacing:.5px;display:flex;align-items:flex-start;gap:10px;
  animation:slideDown .25s ease;line-height:1.5;
}
.wrong-msg .wm-icon{font-size:16px;flex-shrink:0;margin-top:1px}

.wrong-msg .wm-title{font-size:12px;opacity:.8;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.wrong-msg .wm-detail{font-family:'Space Mono',monospace;font-size:11px;opacity:.9;word-break:break-all;line-height:1.6}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo{font-size:clamp(22px,5vw,36px);font-weight:800;letter-spacing:-1.5px;background:linear-gradient(135deg,var(--correct),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.theme-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 12px;cursor:pointer;font-size:18px;transition:all .2s;color:var(--text);display:flex;align-items:center;gap:6px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text2)}
.theme-btn:hover{border-color:var(--easy);color:var(--text)}

/* START SCREEN */
.screen-start{animation:fadeIn .4s ease}
.start-sub{font-size:10px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;text-align:center}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
@media(max-width:480px){.level-grid{grid-template-columns:1fr;gap:10px}}
.lcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px 12px 16px;cursor:pointer;transition:border-color .2s,transform .15s,background .2s;text-align:center;position:relative}
.lcard:hover{transform:translateY(-3px)}
.lcard.easy:hover,.lcard.easy.sel{border-color:var(--easy);background:var(--bg3)}
.lcard.medium:hover,.lcard.medium.sel{border-color:var(--medium);background:var(--bg3)}
.lcard.hard:hover,.lcard.hard.sel{border-color:var(--hard);background:var(--bg3)}
.lcard .check{position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s}
.lcard.sel .check{border-color:var(--easy);background:var(--easy);color:#000}
.lcard.medium.sel .check{border-color:var(--medium);background:var(--medium)}
.lcard.hard.sel .check{border-color:var(--hard);background:var(--hard)}
.lc-icon{font-size:26px;margin-bottom:9px}
.lc-name{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.lcard.easy .lc-name{color:var(--easy)}.lcard.medium .lc-name{color:var(--medium)}.lcard.hard .lc-name{color:var(--hard)}
.lc-desc{font-size:11px;color:var(--text3);line-height:1.5}
.lc-time{font-size:9px;margin-top:7px;letter-spacing:1px;text-transform:uppercase;color:var(--text4)}
.btn-go{width:100%;background:linear-gradient(135deg,var(--correct),var(--accent));color:#0a0a0f;border:none;padding:14px;font-size:16px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;border-radius:6px;letter-spacing:1px;text-transform:uppercase;transition:opacity .2s,transform .1s;opacity:.35;pointer-events:none;margin-bottom:20px}
.btn-go.rdy{opacity:1;pointer-events:all}
.btn-go.rdy:hover{opacity:.9;transform:scale(1.02)}
.how{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px 18px}
.how h3{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.how li{font-size:12px;color:var(--text2);padding:4px 0 4px 16px;position:relative;list-style:none;line-height:1.5}
.how li::before{content:'▸';position:absolute;left:0;color:var(--easy)}

/* GAME SCREEN */
.screen-game{animation:fadeIn .3s ease}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;text-align:center;min-width:72px}
.slbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-weight:600}
.sval{font-family:'Space Mono',monospace;font-size:clamp(16px,3vw,20px);font-weight:700;color:var(--text);line-height:1.2;margin-top:1px}
.sval.tok{color:var(--correct)}.sval.twarn{color:var(--warn)}.sval.tlow{color:var(--wrong)}
.tbar-wrap{flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.tbar-fill{height:100%;border-radius:3px;transition:width .1s linear,background .3s}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.lvl-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid}
.be{color:var(--easy);border-color:var(--easy);background:color-mix(in srgb,var(--easy) 12%,transparent)}
.bm{color:var(--medium);border-color:var(--medium);background:color-mix(in srgb,var(--medium) 12%,transparent)}
.bh{color:var(--hard);border-color:var(--hard);background:color-mix(in srgb,var(--hard) 12%,transparent)}
.streak-row{display:flex;align-items:center;gap:4px}
.pip{width:8px;height:8px;border-radius:50%;background:var(--border2);border:1px solid var(--border);transition:all .2s}
.pip.on{background:var(--correct);border-color:var(--correct)}
.stxt{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-left:5px}

.bonus-bar{background:color-mix(in srgb,var(--correct) 15%,transparent);border:1px solid var(--correct);border-radius:7px;padding:8px 14px;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--correct);letter-spacing:.5px;text-align:center;animation:slideDown .25s ease;display:none}
.bonus-bar.show{display:block}

.word-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:clamp(16px,3vw,24px) clamp(14px,3vw,22px) 18px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden}
.word-disp{font-family:'Space Mono',monospace;font-size:clamp(20px,4.5vw,38px);font-weight:700;letter-spacing:clamp(2px,1vw,5px);word-break:break-all;line-height:1.4}
.sent-disp{font-family:'Space Mono',monospace;font-size:clamp(12px,2.2vw,17px);font-weight:400;line-height:1.8;letter-spacing:.5px;word-break:break-word;text-align:center}
.para-disp{font-family:'Space Mono',monospace;font-size:clamp(11px,1.8vw,14px);font-weight:400;line-height:1.9;letter-spacing:.3px;word-break:break-word;text-align:left}
.wc{display:inline;transition:color .04s}
.wc.correct{color:var(--correct)}.wc.wrong{color:var(--wrong)}.wc.pending{color:var(--border)}.wc.current{color:var(--text);border-bottom:2px solid var(--text)}
.type-hint{font-size:9px;color:var(--text4);letter-spacing:2px;text-transform:uppercase;margin-top:10px}

.input-wrap{position:relative;margin-bottom:12px}
.wi{width:100%;background:var(--bg3);border:2px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'Space Mono',monospace;font-size:clamp(14px,3vw,18px);font-weight:700;color:var(--text);outline:none;text-align:center;letter-spacing:2px;transition:border-color .15s,background .2s;caret-color:var(--correct)}
.wi-para{text-align:left;letter-spacing:.5px;font-size:clamp(12px,2vw,14px);line-height:1.7;resize:none;height:80px;padding:10px 14px;font-weight:400}
.wi:focus{border-color:color-mix(in srgb,var(--correct) 40%,transparent)}
.wi.correct{border-color:var(--correct);background:color-mix(in srgb,var(--correct) 8%,transparent)}
.wi.wrong{border-color:var(--wrong);background:color-mix(in srgb,var(--wrong) 6%,transparent)}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
@media(max-width:360px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.mini{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;text-align:center}
.ml{font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.mv{font-family:'Space Mono',monospace;font-size:clamp(13px,2.5vw,15px);color:var(--text2);font-weight:700;margin-top:1px}
.mv.g{color:var(--correct)}.mv.r{color:var(--wrong)}.mv.y{color:var(--warn)}

/* OVER SCREEN */
.screen-over{text-align:center;padding:24px 0;animation:fadeIn .4s ease}
.over-t{font-size:clamp(28px,6vw,42px);font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--correct),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:3px}
.over-s{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
.rank-pill{display:inline-block;padding:6px 22px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;border:1px solid}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px}
@media(max-width:380px){.res-grid{grid-template-columns:1fr;gap:8px}}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px 8px;text-align:center}
.rl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.rv{font-family:'Space Mono',monospace;font-size:clamp(22px,4vw,28px);font-weight:700;color:var(--text)}
.rc.hi .rv{background:linear-gradient(135deg,var(--correct),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rs{font-size:10px;color:var(--text4);margin-top:3px}
.wpm-wrap{margin-bottom:20px}
.wpm-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.wpm-bg{height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.wpm-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--correct),var(--accent));transition:width 1s ease}
.btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.br{background:transparent;color:var(--correct);border:2px solid var(--correct);padding:11px 28px;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;border-radius:4px;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
.br:hover{background:color-mix(in srgb,var(--correct) 12%,transparent);transform:scale(1.02)}
.br.sec{color:var(--text3);border-color:var(--border)}
.br.sec:hover{background:var(--bg3);color:var(--text2)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}60%{transform:translateX(6px)}}
.shake{animation:shake .22s ease}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef,useCallback,useMemo}=React;

const EW=['cat','dog','run','fly','sun','map','hat','big','cup','red','sea','top','box','let','fix','mix','pin','cut','win','zip','ace','bat','bed','bit','bug','bus','cab','can','cap','cod','cop','cot','cow','cry','cub','dam','dip','dot','dry','dug','ear','eat','egg','elk','end','fan','fig','fit','fog','fox','fun','gap','gas','gem','gin','got','gum','gun','gut','ham','hen','hid','hip','hit','hog','hop','hot','hub','hug','hum','hut','ice','ill','ink','jam','jot','joy','jug','key','kid','kit','lab','lag','lap','law','lay','leg','lid','lip','lit','log','lot','mad','man','mat','mop','mud','mug','nap','net','nip','nod','nut','oak','odd','oil','old','out','own','pad','pan','paw','pea','peg','pet','pig','pit','pod','pop','pot','pub','pup','put','rag','ram','ran','rap','rat','raw','ray','rib','rid','rip','rob','rod','rot','row','rub','rug','rum','rut','sad','sap','sat','saw','say','set','sew','sin','sip','sir','sit','six','ski','sky','sob','son','spa','spy','sub','sum','tab','tan','tap','tar','tax','ten','tie','tin','tip','ton','toy','try','tub','tug','two','van','vat','vet','vow','wag','war','was','way','web','wed','wet','wig','wit','yam','yap','you','zap'];

const MS=['The quick brown fox jumps over the lazy dog.','She sells seashells by the seashore every day.','How much wood would a woodchuck chuck if it could?','The sun rises in the east and sets in the west.','A journey of a thousand miles begins with one step.','Actions speak louder than words every single time.','Knowledge is power, and power is responsibility.','The early bird catches the worm each morning.','Practice makes perfect over time with effort.','Every cloud has a silver lining within it.','Time flies when you are having genuine fun.','Better late than never, but better early always.','Two wrongs do not make a right at all.','The pen is mightier than the sword indeed.','You cannot judge a book by its cover ever.','All that glitters is not gold in life.','When in Rome, do as the Romans do.','Good things come to those who wait patiently.','Honesty is the best policy in all the world.','The grass is always greener on the other side.','Look before you leap into any big decision.','Where there is smoke, there is fire nearby.','Laughter is the best medicine for the soul.','Great minds think alike most of the time.','Necessity is the mother of all great invention.','Too many cooks will always spoil the broth.','A rolling stone gathers absolutely no moss.','You truly reap exactly what you sow in life.','The strongest oak was once a tiny little acorn.','Life is what happens while you are making plans.','In the middle of great difficulty lies opportunity.','Dream big and work hard every single day.','Success is not final, and failure is not fatal.','It always seems impossible until it is fully done.','Be the change you wish to see in the world.','The secret of change is to build the new.','Stars cannot shine without darkness all around.','A smooth sea never made a truly skilled sailor.','Believe you can and you are halfway there already.','The only way to do great work is to love it.'];

const HP=['The human brain is the most complex structure known. It contains roughly eighty-six billion neurons, each connected to thousands of others. These connections form networks responsible for everything we think and feel. Scientists continue to unravel its mysteries every year.','Climate change poses one of the greatest threats today. Rising global temperatures are causing glaciers to melt rapidly. Sea levels are rising and weather patterns are shifting. Extreme weather events are becoming more frequent and intense worldwide.','The internet has transformed how human beings communicate. In just decades it connected billions of people globally. Social media platforms reshaped politics, culture, and commerce. Yet digital inequality remains a persistent global challenge today.','Artificial intelligence is rapidly reshaping every industry. Machine learning can now diagnose diseases and translate languages. Concerns about job loss and algorithmic bias are growing louder. Society must carefully navigate these complex technological transitions ahead.','Space exploration has always captured human imagination deeply. From the moon landing to powerful space telescopes, we pushed limits. Today private companies are joining agencies racing to Mars. Colonizing other planets may define our species future entirely.','Biodiversity is the very foundation of all life on Earth. Healthy ecosystems depend on rich variety of living organisms. Human activities are causing species to go extinct at alarming rates. Protecting natural habitats is essential for long-term sustainability.','Music is a universal language transcending all cultural boundaries. From ancient drumbeats to classical orchestras, it accompanied humanity. Neuroscientists found music activates nearly every brain region at once. This makes it uniquely powerful among all human experiences.','Quantum mechanics is the strangest theory in all physics. Particles can exist in multiple states at the same time. They can become entangled across vast cosmic distances instantly. These phenomena form the foundation of modern electronics and computers.','The history of medicine is a story of great perseverance. From penicillin to vaccines, breakthroughs have saved millions of lives. Today gene editing technologies offer the possibility of curing disease. Science continues to push the boundaries of what is possible.','Philosophy teaches us to question what we take for granted. From Socrates to modern thinkers, ideas have shaped civilization. Critical thinking, logic, and ethics guide our understanding of the world. Studying philosophy makes us better thinkers and kinder human beings.'];

const LCFG={
  easy:{label:'Easy',color:'easy',time:30,sg:6,bs:4,desc:'3-letter words',tl:'30 sec · Space to submit'},
  medium:{label:'Medium',color:'medium',time:45,sg:4,bs:5,desc:'Full sentences',tl:'45 sec · Enter to submit'},
  hard:{label:'Hard',color:'hard',time:60,sg:3,bs:6,desc:'Full paragraphs',tl:'60 sec · Enter to submit'}
};

function getRank(wpm,lvl){
  const t=lvl==='easy'?[70,50,30,15]:lvl==='medium'?[60,40,25,12]:[50,35,20,10];
  if(wpm>=t[0])return{l:'LIGHTNING',c:'#00ffb2'};
  if(wpm>=t[1])return{l:'EXPERT',c:'#00c8ff'};
  if(wpm>=t[2])return{l:'ADVANCED',c:'#aa88ff'};
  if(wpm>=t[3])return{l:'INTERMEDIATE',c:'#ffaa00'};
  return{l:'BEGINNER',c:'#ff6644'};
}

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function WrongMsg({typed,expected,level}){
  const title=level==='easy'?'Wrong word!':level==='medium'?'Wrong sentence!':'Wrong paragraph!';
  const short=expected.length>60?expected.slice(0,60)+'…':expected;
  return React.createElement('div',{className:'wrong-msg'},
    React.createElement('div',{className:'wm-icon'},'✕'),
    React.createElement('div',{className:'wm-body'},
      React.createElement('div',{className:'wm-title'},title),
      React.createElement('div',{className:'wm-detail'},
        React.createElement('span',{style:{opacity:.7}},'You typed: '),
        React.createElement('span',null,typed.length>60?typed.slice(0,60)+'…':typed),
        React.createElement('br'),
        React.createElement('span',{style:{opacity:.7}},'Expected: '),
        React.createElement('span',null,short)
      )
    )
  );
}

function App(){
  const [dark,setDark]=useState(true);
  const [screen,setScreen]=useState('start');
  const [selLvl,setSelLvl]=useState(null);
  const [lvl,setLvl]=useState(null);
  const [queue,setQueue]=useState([]);
  const [current,setCurrent]=useState('');
  const [inp,setInp]=useState('');
  const [tLeft,setTLeft]=useState(30);
  const [streak,setStreak]=useState(0);
  const [correct,setCorrect]=useState(0);
  const [incorrect,setIncorrect]=useState(0);
  const [totalT,setTotalT]=useState(0);
  const [inpState,setInpState]=useState('idle');
  const [shake,setShake]=useState(false);
  const [bonusMsg,setBonusMsg]=useState('');
  const [showBonus,setShowBonus]=useState(false);
  const [startMs,setStartMs]=useState(null);
  const [wrongInfo,setWrongInfo]=useState(null);
  const timerR=useRef(null);
  const bonusR=useRef(null);
  const wrongR=useRef(null);
  const inpR=useRef(null);

  useEffect(()=>{
    document.body.className=dark?'':'light';
  },[dark]);

  const src=useCallback((l)=>l==='easy'?EW:l==='medium'?MS:HP,[]);

  const loadNext=useCallback((q,l)=>{
    let arr=q.length<3?[...q,...shuf(src(l))]:q;
    setCurrent(arr[0]);setQueue(arr.slice(1));setInp('');setInpState('idle');
    return arr.slice(1);
  },[src]);

  const addTime=useCallback((sec)=>{
    clearInterval(timerR.current);
    setTLeft(t=>Math.min(t+sec,150));
    timerR.current=setInterval(()=>{
      setTLeft(t=>{if(t<=0.1){clearInterval(timerR.current);setScreen('over');return 0;}return+(t-0.1).toFixed(1);});
    },100);
  },[]);

  const showWrong=useCallback((typed,expected)=>{
    setWrongInfo({typed,expected});
    clearTimeout(wrongR.current);
    wrongR.current=setTimeout(()=>setWrongInfo(null),3500);
  },[]);

  const startGame=useCallback(()=>{
    if(!selLvl)return;
    const cfg=LCFG[selLvl];
    const q=shuf(src(selLvl));
    setLvl(selLvl);setQueue(q.slice(1));setCurrent(q[0]);
    setInp('');setTLeft(cfg.time);setStreak(0);setCorrect(0);setIncorrect(0);
    setTotalT(0);setInpState('idle');setStartMs(null);
    setShowBonus(false);setWrongInfo(null);
    setScreen('game');
    setTimeout(()=>inpR.current&&inpR.current.focus(),80);
  },[selLvl,src]);

  useEffect(()=>{
    if(screen!=='game')return;
    timerR.current=setInterval(()=>{
      setTLeft(t=>{if(t<=0.1){clearInterval(timerR.current);setScreen('over');return 0;}return+(t-0.1).toFixed(1);});
    },100);
    return()=>clearInterval(timerR.current);
  },[screen]);

  const handleCorrect=useCallback((typedLen)=>{
    if(!startMs)return;
    const ns=streak+1;
    setStreak(ns);setCorrect(c=>c+1);setTotalT(n=>n+1);setInpState('correct');
    const cfg=LCFG[lvl];
    if(ns%cfg.sg===0){
      addTime(cfg.bs);
      setBonusMsg(`${cfg.sg}-STREAK! +${cfg.bs}s BONUS`);
      setShowBonus(true);clearTimeout(bonusR.current);
      bonusR.current=setTimeout(()=>setShowBonus(false),2200);
    }
  },[streak,lvl,startMs,addTime]);

  const handleWrong=useCallback((typed,expected)=>{
    setStreak(0);setIncorrect(i=>i+1);setTotalT(n=>n+1);
    setInpState('wrong');setShake(true);
    setTimeout(()=>setShake(false),300);
    showWrong(typed,expected);
  },[showWrong]);

  const submitEasy=useCallback((val)=>{
    if(!startMs)setStartMs(Date.now());
    const typed=val.trim();
    if(!typed)return;
    if(typed===current){
      handleCorrect(typed.length);
      setTimeout(()=>setQueue(q=>loadNext(q,'easy')),80);
    } else {
      handleWrong(typed,current);
      setTimeout(()=>setQueue(q=>loadNext(q,'easy')),350);
    }
  },[current,handleCorrect,handleWrong,loadNext,startMs]);

  const handleEasyChange=useCallback((e)=>{
    const v=e.target.value;
    if(!startMs)setStartMs(Date.now());
    if(v.endsWith(' ')||v.endsWith('\n')){submitEasy(v);}
    else setInp(v);
  },[submitEasy,startMs]);

  const handleMediumChange=useCallback((e)=>{
    if(!startMs)setStartMs(Date.now());
    setInp(e.target.value);
  },[startMs]);

  const handleMediumKey=useCallback((e)=>{
    if(e.key!=='Enter')return;
    e.preventDefault();
    const typed=inp.trim();if(!typed)return;
    if(typed===current.trim()){
      handleCorrect(typed.length);
      setTimeout(()=>setQueue(q=>loadNext(q,'medium')),100);
    } else {
      handleWrong(typed,current);
      setTimeout(()=>setQueue(q=>loadNext(q,'medium')),400);
    }
  },[inp,current,handleCorrect,handleWrong,loadNext]);

  const handleHardChange=useCallback((e)=>{
    const v=e.target.value;
    if(!startMs)setStartMs(Date.now());
    setInp(v);
    if(v===current){
      handleCorrect(v.length);
      setTimeout(()=>setQueue(q=>loadNext(q,'hard')),150);
    }
  },[current,handleCorrect,loadNext,startMs]);

  const handleHardKey=useCallback((e)=>{
    if(e.key!=='Enter')return;
    e.preventDefault();
    const typed=inp.trim();if(!typed)return;
    if(typed!==current.trim()){
      handleWrong(typed,current);
      setTimeout(()=>setQueue(q=>loadNext(q,'hard')),400);
    }
  },[inp,current,handleWrong,loadNext]);

  const elapsed=startMs?Math.max((Date.now()-startMs)/60000,0.01):0.01;
  const liveWpm=correct>0?Math.round(correct/elapsed):0;
  const acc=totalT>0?Math.round((correct/totalT)*100):100;
  const cfg=lvl?LCFG[lvl]:null;
  const timerPct=cfg?Math.max(0,(tLeft/cfg.time)*100):100;
  const timerColor=tLeft>10?'var(--correct)':tLeft>5?'var(--warn)':'var(--wrong)';
  const timerCls=tLeft>10?'tok':tLeft>5?'twarn':'tlow';
  const finalWpm=correct>0&&startMs?Math.round(correct/elapsed):0;

  const renderChars=useCallback((text,userInp)=>{
    return text.split('').map((ch,i)=>{
      let c='pending';
      if(i<userInp.length)c=userInp[i]===ch?'correct':'wrong';
      else if(i===userInp.length)c='current';
      return React.createElement('span',{key:i,className:`wc ${c}`},ch===' '&&c==='pending'?'\u00a0':ch);
    });
  },[]);

  const ThemeBtn=()=>React.createElement('button',{
    className:'theme-btn',onClick:()=>setDark(d=>!d),
    title:dark?'Switch to light mode':'Switch to dark mode'
  },dark?'☀ Light':'⬤ Dark');

  if(screen==='start'){
    return React.createElement('div',{className:'wrap'},
      React.createElement('div',{className:'screen-start'},
        React.createElement('div',{className:'hdr'},
          React.createElement('div',{className:'logo'},'FAST TYPER'),
          React.createElement(ThemeBtn)
        ),
        React.createElement('div',{className:'start-sub'},'Select your difficulty'),
        React.createElement('div',{className:'level-grid'},
          ['easy','medium','hard'].map(l=>{
            const c=LCFG[l];const sel=selLvl===l;
            const icons={easy:'✦',medium:'◈',hard:'◉'};
            return React.createElement('div',{
              key:l,className:`lcard ${l}${sel?' sel':''}`,
              onClick:()=>setSelLvl(l)
            },
              React.createElement('div',{className:'check'},sel?'✓':''),
              React.createElement('div',{className:'lc-icon'},icons[l]),
              React.createElement('div',{className:'lc-name'},c.label),
              React.createElement('div',{className:'lc-desc'},c.desc),
              React.createElement('div',{className:'lc-time'},c.tl)
            );
          })
        ),
        React.createElement('button',{className:`btn-go${selLvl?' rdy':''}`,onClick:startGame},'START GAME'),
        React.createElement('div',{className:'how'},
          React.createElement('h3',null,'How to play'),
          React.createElement('ul',null,
            React.createElement('li',null,'Easy: type 3-letter words → press Space to submit'),
            React.createElement('li',null,'Medium: type full sentences → press Enter to submit'),
            React.createElement('li',null,'Hard: type full paragraphs → press Enter when done'),
            React.createElement('li',null,'Wrong answer shows an error with the correct text'),
            React.createElement('li',null,'Reach your streak goal to earn bonus seconds')
          )
        )
      )
    );
  }

  if(screen==='over'){
    const rank=getRank(finalWpm,lvl);
    return React.createElement('div',{className:'wrap'},
      React.createElement('div',{className:'screen-over'},
        React.createElement('div',{className:'hdr'},
          React.createElement('div',{style:{width:1}}),
          React.createElement('div',{className:'over-t'},'GAME OVER'),
          React.createElement(ThemeBtn)
        ),
        React.createElement('div',{className:'over-s'},`${LCFG[lvl].label} mode · your results`),
        React.createElement('div',{className:'rank-pill',style:{color:rank.c,borderColor:rank.c,background:rank.c+'18'}},rank.l),
        React.createElement('div',{className:'res-grid'},
          React.createElement('div',{className:'rc hi'},
            React.createElement('div',{className:'rl'},'WPM'),
            React.createElement('div',{className:'rv'},finalWpm),
            React.createElement('div',{className:'rs'},'words/min')
          ),
          React.createElement('div',{className:'rc'},
            React.createElement('div',{className:'rl'},'Accuracy'),
            React.createElement('div',{className:'rv'},`${acc}%`),
            React.createElement('div',{className:'rs'},`${correct} correct`)
          ),
          React.createElement('div',{className:'rc'},
            React.createElement('div',{className:'rl'},lvl==='easy'?'Words':lvl==='medium'?'Sentences':'Paragraphs'),
            React.createElement('div',{className:'rv'},correct),
            React.createElement('div',{className:'rs'},`${incorrect} missed`)
          )
        ),
        React.createElement('div',{className:'wpm-wrap'},
          React.createElement('div',{className:'wpm-lbl'},`Speed: ${finalWpm} WPM`),
          React.createElement('div',{className:'wpm-bg'},
            React.createElement('div',{className:'wpm-fill',style:{width:`${Math.min(100,(finalWpm/100)*100)}%`}})
          )
        ),
        React.createElement('div',{className:'btns'},
          React.createElement('button',{className:'br',onClick:startGame},'PLAY AGAIN'),
          React.createElement('button',{className:'br sec',onClick:()=>{setScreen('start');setSelLvl(null)}},'CHANGE LEVEL')
        )
      )
    );
  }

  const isEasy=lvl==='easy',isMed=lvl==='medium',isHard=lvl==='hard';
  const dispCls=isEasy?'word-disp':isMed?'sent-disp':'para-disp';
  const sg=cfg.sg;

  return React.createElement('div',{className:'wrap'},
    React.createElement('div',{className:'screen-game'},
      React.createElement('div',{className:'hdr'},
        React.createElement('div',{className:'logo',style:{fontSize:'clamp(18px,4vw,26px)'}},'FAST TYPER'),
        React.createElement(ThemeBtn)
      ),
      React.createElement('div',{className:'top-bar'},
        React.createElement('div',{className:'sbox'},
          React.createElement('div',{className:'slbl'},'Score'),
          React.createElement('div',{className:'sval'},correct)
        ),
        React.createElement('div',{className:'tbar-wrap'},
          React.createElement('div',{className:'tbar-fill',style:{width:`${timerPct}%`,background:timerColor}})
        ),
        React.createElement('div',{className:'sbox'},
          React.createElement('div',{className:'slbl'},'Time'),
          React.createElement('div',{className:`sval ${timerCls}`},tLeft.toFixed(1)+'s')
        )
      ),
      React.createElement('div',{className:'meta-row'},
        React.createElement('div',{className:`lvl-badge b${lvl[0]}`},cfg.label+' mode'),
        React.createElement('div',{className:'streak-row'},
          ...Array.from({length:sg},(_,i)=>React.createElement('div',{key:i,className:`pip${(streak%sg)>i?' on':''}`})),
          React.createElement('span',{className:'stxt'},streak>0?`${streak} streak`:'streak')
        )
      ),
      wrongInfo&&React.createElement(WrongMsg,{typed:wrongInfo.typed,expected:wrongInfo.expected,level:lvl}),
      showBonus&&React.createElement('div',{className:'bonus-bar show'},`+${cfg.bs}s — ${bonusMsg}`),
      React.createElement('div',{className:'word-box'},
        React.createElement('div',{className:dispCls},renderChars(current,inp)),
        React.createElement('div',{className:'type-hint'},isEasy?'type the word · space to submit':isMed?'type the sentence · enter to submit':'type the paragraph · enter when done')
      ),
      React.createElement('div',{className:'input-wrap'},
        isHard
          ?React.createElement('textarea',{
              ref:inpR,className:`wi wi-para ${inpState!=='idle'?inpState:''} ${shake?'shake':''}`,
              value:inp,onChange:handleHardChange,onKeyDown:handleHardKey,
              placeholder:'Start typing the paragraph here...',
              autoComplete:'off',autoCorrect:'off',autoCapitalize:'off',spellCheck:false
            })
          :React.createElement('input',{
              ref:inpR,className:`wi ${inpState!=='idle'?inpState:''} ${shake?'shake':''}`,
              value:inp,
              onChange:isEasy?handleEasyChange:handleMediumChange,
              onKeyDown:isMed?handleMediumKey:undefined,
              placeholder:isEasy?'type here…':'Type and press Enter…',
              autoComplete:'off',autoCorrect:'off',autoCapitalize:'off',spellCheck:false
            })
      ),
      React.createElement('div',{className:'stats-row'},
        React.createElement('div',{className:'mini'},React.createElement('div',{className:'ml'},'WPM'),React.createElement('div',{className:`mv${liveWpm>0?' g':''}`},liveWpm)),
        React.createElement('div',{className:'mini'},React.createElement('div',{className:'ml'},'Accuracy'),React.createElement('div',{className:`mv${acc>=80?' g':acc>=60?' y':' r'}`},`${acc}%`)),
        React.createElement('div',{className:'mini'},React.createElement('div',{className:'ml'},'Streak'),React.createElement('div',{className:`mv${streak>=3?' g':''}`},streak)),
        React.createElement('div',{className:'mini'},React.createElement('div',{className:'ml'},isEasy?'Words':isMed?'Sent.':'Para.'),React.createElement('div',{className:'mv'},totalT))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
